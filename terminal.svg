<svg fill="none" viewBox="0 0 800 420" width="800" height="420" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        @keyframes t1 { 0%,8%{width:0} 10%,100%{width:7.8em} }
        @keyframes t2 { 0%,14%{width:0} 16%,100%{width:14.5em} }
        @keyframes t3 { 0%,22%{width:0} 24%,100%{width:12em} }
        @keyframes t4 { 0%,30%{width:0} 32%,100%{width:22em} }
        @keyframes t5 { 0%,38%{width:0} 40%,100%{width:18em} }
        @keyframes t6 { 0%,46%{width:0} 48%,100%{width:11em} }
        @keyframes t7 { 0%,54%{width:0} 56%,100%{width:16em} }
        @keyframes t8 { 0%,62%{width:0} 64%,100%{width:26em} }
        @keyframes t9 { 0%,70%{width:0} 72%,100%{width:21em} }
        @keyframes t10 { 0%,78%{width:0} 80%,100%{width:27em} }
        @keyframes f1 { 0%,9%{opacity:0} 10%,100%{opacity:1} }
        @keyframes f2 { 0%,15%{opacity:0} 16%,100%{opacity:1} }
        @keyframes f3 { 0%,23%{opacity:0} 24%,100%{opacity:1} }
        @keyframes f4 { 0%,31%{opacity:0} 32%,100%{opacity:1} }
        @keyframes f5 { 0%,39%{opacity:0} 40%,100%{opacity:1} }
        @keyframes f6 { 0%,47%{opacity:0} 48%,100%{opacity:1} }
        @keyframes f7 { 0%,55%{opacity:0} 56%,100%{opacity:1} }
        @keyframes f8 { 0%,63%{opacity:0} 64%,100%{opacity:1} }
        @keyframes f9 { 0%,71%{opacity:0} 72%,100%{opacity:1} }
        @keyframes f10 { 0%,79%{opacity:0} 80%,100%{opacity:1} }

        .terminal {
          background: #1a1b26;
          border-radius: 10px;
          padding: 0;
          font-family: 'Courier New', monospace;
          font-size: 13px;
          color: #a9b1d6;
          overflow: hidden;
          box-shadow: 0 20px 60px rgba(0,0,0,0.5);
          border: 1px solid #2a2b3d;
        }
        .titlebar {
          background: linear-gradient(180deg, #2a2b3d 0%, #1f2033 100%);
          padding: 10px 14px;
          display: flex;
          align-items: center;
          gap: 8px;
          border-bottom: 1px solid #2a2b3d;
        }
        .dot { width:12px;height:12px;border-radius:50%;display:inline-block; }
        .red { background:#ff5f57; }
        .yellow { background:#febc2e; }
        .green { background:#28c840; }
        .title-text {
          color: #565f89;
          font-size: 12px;
          margin-left: auto;
          margin-right: auto;
        }
        .body { padding: 16px 20px; line-height: 1.8; }
        .prompt { color: #7aa2f7; }
        .cmd { color: #bb9af7; }
        .arg { color: #9ece6a; }
        .output { color: #a9b1d6; }
        .highlight { color: #f7768e; }
        .accent { color: #e0af68; }
        .link { color: #73daca; }
        .comment { color: #565f89; }

        .line { display: flex; white-space: nowrap; }
        .typed {
          display: inline-block;
          overflow: hidden;
          white-space: nowrap;
          border-right: 2px solid #7aa2f7;
          animation-fill-mode: forwards;
          animation-timing-function: steps(30, end);
        }
        .out { opacity: 0; animation-fill-mode: forwards; }

        .l1 .typed { animation: t1 20s infinite, blink 0.8s step-end infinite; }
        .l2 { animation: f1 20s infinite; }
        .l3 .typed { animation: t2 20s infinite; }
        .l4 { animation: f2 20s infinite; }
        .l5 .typed { animation: t3 20s infinite; }
        .l6 { animation: f3 20s infinite; }
        .l7 { animation: f3 20s infinite; }
        .l8 { animation: f3 20s infinite; }
        .l9 { animation: f4 20s infinite; }
        .l10 .typed { animation: t5 20s infinite; }
        .l11 { animation: f5 20s infinite; }
        .l12 { animation: f5 20s infinite; }
        .l13 { animation: f5 20s infinite; }
        .l14 { animation: f5 20s infinite; }
        .l15 { animation: f6 20s infinite; }
        .l16 .typed { animation: t7 20s infinite; }
        .l17 { animation: f7 20s infinite; }
        .l18 { animation: f7 20s infinite; }
        .l19 { animation: f7 20s infinite; }
        .l20 { animation: f8 20s infinite; }
      </style>
      <div class="terminal">
        <div class="titlebar">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
          <span class="title-text">nusnus@celery ~ </span>
        </div>
        <div class="body">
          <div class="line l1"><span class="prompt">$&nbsp;</span><span class="typed"><span class="cmd">whoami</span></span></div>
          <div class="out l2"><span class="output">Tomer Nosrati </span><span class="comment"># a.k.a Nusnus</span></div>
          <div class="line l3" style="margin-top:6px"><span class="prompt">$&nbsp;</span><span class="typed"><span class="cmd">cat</span><span class="arg"> ~/roles.txt</span></span></div>
          <div class="out l4" style="padding-left:0">
            <span class="highlight">&#9656; </span><span class="output">Software Engineer</span><br/>
            <span class="highlight">&#9656; </span><span class="output">Tech-Lead @ </span><span class="link">pytest-celery</span><br/>
            <span class="highlight">&#9656; </span><span class="output">Owner @ </span><span class="link">Celery Organization</span>
          </div>
          <div class="line l9" style="margin-top:6px"><span class="prompt">$&nbsp;</span><span class="typed"><span class="cmd">ls</span><span class="arg"> ~/active-projects/</span></span></div>
          <div class="out l10" style="padding-left:0">
            <span class="link">celery/celery&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><span class="comment"># Distributed task queue</span><br/>
            <span class="link">celery/pytest-celery&nbsp;</span><span class="comment"># pytest plugin for Celery</span><br/>
            <span class="link">celery/kombu&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><span class="comment"># Python messaging library</span>
          </div>
          <div class="line l15" style="margin-top:6px"><span class="prompt">$&nbsp;</span><span class="typed"><span class="cmd">echo</span><span class="arg"> $LANGUAGES</span></span></div>
          <div class="out l16" style="padding-left:0">
            <span class="accent">Hebrew</span><span class="output"> | </span><span class="accent">English</span><span class="output"> | </span><span class="accent">Spanish</span>
          </div>
          <div class="line l20" style="margin-top:6px"><span class="prompt">$&nbsp;</span><span class="typed" style="animation: blink 0.8s step-end infinite !important; width: auto !important; border-right: 2px solid #7aa2f7;">&nbsp;</span></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
